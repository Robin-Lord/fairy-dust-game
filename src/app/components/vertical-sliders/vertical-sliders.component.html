<div class="container-fluid">
  <div class="row" style="height: 50vh">
    <div class="col-2" style="height: 100%" class="custom-slider">
    <ion-row style="height: 90%" class="custom-slider">
      <ion-col *ngFor="let item of this.comValService.allCommodities | keyvalue">
        <p>{{item.value.shortened}}</p>
        <p>{{item.value.current_val}}</p>
        <ngx-slider class=custom-slider-{{item.key}} [(value)]="item.value[this.comValService.ownedAndWantedStatus.focus_state]" [options]="verticalSlider1.options" 
        
        ></ngx-slider>

      </ion-col>
      </ion-row>

  </div>
</div>
